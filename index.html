<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vraj Lathiya — Engineering at the waterline</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />

  <style>
    /* ----------  Tokens  ---------- */
    :root {
      --ink: #0a1220;
      --ink-2: #1a2438;
      --ink-3: #3a4458;
      --ink-4: #5a6478;
      --hair: rgba(10, 18, 32, 0.12);
      --hair-2: rgba(10, 18, 32, 0.08);
      --paper: #eef1f6;
      --paper-2: #e4e8f0;
      --milk: rgba(255, 255, 255, 0.6);
      --milk-2: rgba(255, 255, 255, 0.45);
      --milk-edge: rgba(255, 255, 255, 0.75);
      --teal: #5dd2c9;
      --azure: #7aa9ff;
      --signal: #16a34a;

      --serif: 'Instrument Serif', 'New York', Georgia, serif;
      --sans: 'Inter', 'SF Pro Display', system-ui, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;

      --face: var(--sans);
      --face-display: var(--sans);
      --face-em: var(--serif);

      --motion-scale: 1;
      /* 0 off · 1 calm · 2 lively */

      color-scheme: light;
    }

    /* ----------  Preset: terminal  ---------- */
    [data-preset="terminal"] {
      --ink: #d8efe1;
      --ink-2: #b8dcc4;
      --ink-3: #9bc4a8;
      --ink-4: #7da490;
      --hair: rgba(216, 239, 225, 0.22);
      --hair-2: rgba(216, 239, 225, 0.14);
      --paper: #08120d;
      --paper-2: #0d1c14;
      --milk: rgba(216, 239, 225, 0.06);
      --milk-2: rgba(216, 239, 225, 0.04);
      --milk-edge: rgba(216, 239, 225, 0.22);
      --teal: #7ee2c8;
      --azure: #8fb6e2;
      --signal: #7ee29a;
      --face: var(--mono);
      --face-display: var(--mono);
      --face-em: var(--mono);
      color-scheme: dark;
    }

    /* ----------  Preset: editorial  ---------- */
    [data-preset="editorial"] {
      --ink: #1a1410;
      --ink-2: #2a221b;
      --ink-3: #534435;
      --ink-4: #7a6754;
      --hair: rgba(26, 20, 16, 0.14);
      --hair-2: rgba(26, 20, 16, 0.08);
      --paper: #f6f1ea;
      --paper-2: #ece4d6;
      --milk: rgba(255, 252, 245, 0.55);
      --milk-2: rgba(255, 252, 245, 0.40);
      --milk-edge: rgba(255, 252, 245, 0.85);
      --teal: #b86a3c;
      --azure: #c89878;
      --signal: #6a8c4a;
      --face-em: var(--serif);
    }

    /* ----------  Reset & base  ---------- */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--face);
      color: var(--ink);
      background: var(--paper);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
      color: inherit;
      background: none;
      border: 0;
      cursor: pointer;
      padding: 0;
    }

    img {
      display: block;
      max-width: 100%;
    }

    ::selection {
      background: var(--teal);
      color: var(--paper);
    }

    /* ----------  Page shell  ---------- */
    .page {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      isolation: isolate;
    }

    .stage {
      position: relative;
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px clamp(20px, 4vw, 56px) 120px;
      z-index: 2;
    }

    /* ----------  Ambient background  ---------- */
    .ambient {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      will-change: transform;
      animation: drift 24s ease-in-out infinite alternate;
      animation-duration: calc(24s / max(var(--motion-scale), 0.0001));
    }

    .orb.o1 {
      width: 640px;
      height: 640px;
      top: -220px;
      left: -160px;
      background: var(--azure);
      opacity: 0.55;
    }

    .orb.o2 {
      width: 520px;
      height: 520px;
      top: 30vh;
      right: -160px;
      background: var(--teal);
      opacity: 0.40;
      animation-delay: -8s;
    }

    .orb.o3 {
      width: 480px;
      height: 480px;
      bottom: -180px;
      left: 30vw;
      background: #b9c8ff;
      opacity: 0.35;
      animation-delay: -14s;
    }

    [data-preset="terminal"] .orb {
      opacity: 0.18 !important;
      filter: blur(160px);
    }

    [data-preset="editorial"] .orb {
      opacity: 0.30 !important;
    }

    @keyframes drift {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
      }

      50% {
        transform: translate3d(40px, -30px, 0) scale(1.08);
      }

      100% {
        transform: translate3d(-30px, 40px, 0) scale(0.96);
      }
    }

    /* CRT scanlines for terminal */
    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0;
      background: repeating-linear-gradient(to bottom, transparent 0, transparent 2px, rgba(196, 232, 214, 0.025) 2px, rgba(196, 232, 214, 0.025) 3px);
      mix-blend-mode: screen;
    }

    [data-preset="terminal"] .scanlines {
      opacity: 1;
    }

    /* Caustic shimmer over the page — extremely subtle */
    .caustics {
      position: fixed;
      inset: -20%;
      z-index: 1;
      pointer-events: none;
      opacity: 0.22;
      mix-blend-mode: overlay;
      background:
        radial-gradient(ellipse 60% 40% at 30% 20%, rgba(255, 255, 255, 0.5), transparent 60%),
        radial-gradient(ellipse 40% 30% at 70% 70%, rgba(255, 255, 255, 0.4), transparent 60%),
        radial-gradient(ellipse 30% 25% at 85% 25%, rgba(255, 255, 255, 0.35), transparent 60%);
      animation: causticDrift 18s ease-in-out infinite alternate;
      animation-duration: calc(18s / max(var(--motion-scale), 0.0001));
    }

    [data-preset="terminal"] .caustics {
      opacity: 0;
    }

    @keyframes causticDrift {
      0% {
        transform: translate(0, 0) scale(1) rotate(0deg);
      }

      100% {
        transform: translate(-3%, 2%) scale(1.06) rotate(2deg);
      }
    }

    /* Bubbles rising */
    .bubble {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.2) 40%, transparent 70%);
      border: 0.5px solid rgba(255, 255, 255, 0.6);
      pointer-events: none;
      animation: rise linear infinite;
      animation-duration: calc(var(--dur, 14s) / max(var(--motion-scale), 0.0001));
      animation-delay: var(--delay, 0s);
      opacity: 0;
    }

    [data-preset="terminal"] .bubble {
      background: radial-gradient(circle at 35% 30%, rgba(93, 210, 201, 0.6), rgba(93, 210, 201, 0.1) 50%, transparent 70%);
      border-color: rgba(93, 210, 201, 0.25);
    }

    @keyframes rise {
      0% {
        transform: translateY(40px) translateX(0) scale(0.6);
        opacity: 0;
      }

      10% {
        opacity: 0.85;
      }

      50% {
        transform: translateY(-180px) translateX(var(--drift, 16px)) scale(1);
      }

      90% {
        opacity: 0.5;
      }

      100% {
        transform: translateY(-360px) translateX(calc(var(--drift, 16px) * -0.6)) scale(1.1);
        opacity: 0;
      }
    }

    /* ----------  Glass primitives  ---------- */
    .glass {
      background: var(--milk);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border: 0.5px solid var(--hair);
      box-shadow:
        0 1px 0 var(--milk-edge) inset,
        0 -1px 0 var(--hair) inset,
        0 8px 24px rgba(20, 30, 60, 0.06);
    }

    [data-preset="terminal"] .glass {
      background: var(--milk);
      border: 1px solid var(--hair);
      backdrop-filter: blur(8px);
      box-shadow: 0 0 0 1px var(--hair) inset, 0 0 24px rgba(93, 210, 201, 0.04);
    }

    [data-preset="editorial"] .glass {
      border-radius: 4px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 13px;
      border-radius: 999px;
      font-size: 11.5px;
      font-weight: 500;
      letter-spacing: 0.005em;
      color: var(--ink-2);
    }

    [data-preset="terminal"] .pill {
      border-radius: 2px;
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    [data-preset="terminal"] .pill::before {
      content: "[ ";
      opacity: 0.6;
    }

    [data-preset="terminal"] .pill::after {
      content: " ]";
      opacity: 0.6;
    }

    .signal-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--signal);
      box-shadow: 0 0 6px var(--signal);
      animation: pulse 2.4s ease-in-out infinite;
      animation-duration: calc(2.4s / max(var(--motion-scale), 0.5));
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.55;
        transform: scale(0.86);
      }
    }

    /* ----------  Eyebrow / kicker  ---------- */
    .eyebrow {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--ink-4);
      font-weight: 500;
    }

    [data-preset="terminal"] .eyebrow::before {
      content: "// ";
      opacity: 0.5;
    }

    /* ----------  Nav  ---------- */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 22px;
      border-radius: 999px;
      margin: 0 auto 56px;
      max-width: 980px;
      position: sticky;
      top: 18px;
      z-index: 50;
    }

    [data-preset="terminal"] .nav {
      border-radius: 2px;
      max-width: 100%;
    }

    .nav .brand {
      display: flex;
      align-items: center;
      gap: 9px;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: -0.005em;
    }

    .nav .brand .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--ink);
      box-shadow: 0 0 0 3px var(--milk);
    }

    [data-preset="terminal"] .nav .brand .dot {
      border-radius: 0;
      box-shadow: none;
      animation: blink 1.4s steps(2, end) infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    .nav .links {
      display: flex;
      gap: 22px;
      font-size: 13px;
      color: var(--ink-2);
      font-weight: 500;
      align-items: center;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .nav .links a {
      position: relative;
      padding: 4px 2px;
      cursor: pointer;
    }

    .nav .links a::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -2px;
      height: 1px;
      background: var(--ink);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s cubic-bezier(.2, .7, .2, 1);
    }

    .nav .links a:hover::after {
      transform: scaleX(1);
    }

    .nav .cta {
      padding: 10px 20px;
      border-radius: 999px;
      background: var(--ink);
      color: var(--paper);
      font-weight: 500;
      font-size: 13px;
      letter-spacing: -0.005em;
      cursor: pointer;
      transition: transform 0.3s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }

    [data-preset="terminal"] .nav .cta {
      border-radius: 2px;
      padding: 9px 16px;
      font-size: 12px;
    }

    [data-preset="terminal"] .nav .cta::before {
      content: "> ";
    }

    .nav .cta:hover {
      transform: translateY(-1px);
    }

    /* ----------  Hero  ---------- */
    .hero {
      position: relative;
      display: grid;
      grid-template-columns: 1.55fr 1fr;
      gap: 56px;
      align-items: center;
      padding-top: 8px;
      padding-bottom: 80px;
    }

    .hero .display {
      font-family: var(--face-display);
      font-size: clamp(56px, 7.5vw, 96px);
      line-height: 0.95;
      letter-spacing: -0.035em;
      font-weight: 500;
      margin: 18px 0 22px;
      color: var(--ink);
      text-wrap: balance;
    }

    [data-preset="terminal"] .hero .display {
      letter-spacing: -0.02em;
      font-weight: 600;
      font-size: clamp(40px, 5.5vw, 68px);
    }

    [data-preset="editorial"] .hero .display {
      font-family: var(--face-em);
      font-weight: 400;
      font-size: clamp(64px, 9vw, 120px);
      line-height: 0.94;
      letter-spacing: -0.025em;
    }

    .hero .em {
      font-family: var(--face-em);
      font-style: italic;
      font-weight: 400;
      color: var(--ink-2);
      position: relative;
      display: inline-block;
    }

    [data-preset="terminal"] .hero .em {
      font-style: normal;
      color: var(--teal);
      background: rgba(93, 210, 201, 0.10);
      padding: 0 0.15em;
      display: inline-block;
      white-space: nowrap;
    }

    [data-preset="terminal"] .hero .em::before {
      content: "< ";
      opacity: 0.55;
    }

    [data-preset="terminal"] .hero .em::after {
      content: " />";
      opacity: 0.55;
    }

    /* Water-distorted waterline word */
    .waterline-wrap {
      display: inline-block;
      position: relative;
      /* Reserve vertical room so the displacement filter region doesn't bleed into neighbouring lines. */
      padding: 0.08em 0.04em;
      margin: -0.08em -0.04em;
      overflow: visible;
    }

    .waterline-wrap .water-text {
      display: inline-block;
      background: linear-gradient(180deg, var(--ink-2) 0%, var(--ink-2) 55%, var(--azure) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
      filter: url(#waterFilter);
      will-change: filter;
    }

    [data-preset="terminal"] .waterline-wrap .water-text {
      filter: none;
      background: none;
      -webkit-text-fill-color: var(--teal);
      color: var(--teal);
    }

    .lede {
      font-size: 16.5px;
      line-height: 1.6;
      max-width: 520px;
      color: var(--ink-3);
      margin: 0 0 32px;
      text-wrap: pretty;
    }

    [data-preset="terminal"] .lede {
      font-size: 14px;
    }

    [data-preset="editorial"] .lede {
      font-family: var(--face-em);
      font-size: 22px;
      line-height: 1.4;
      color: var(--ink-2);
      max-width: 580px;
    }

    .cta-row {
      display: flex;
      gap: 10px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 13px 22px;
      border-radius: 999px;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.3s cubic-bezier(.2, .7, .2, 1), box-shadow 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn .arr {
      transition: transform 0.4s cubic-bezier(.2, .7, .2, 1);
    }

    .btn:hover .arr {
      transform: translateX(4px);
    }

    [data-preset="terminal"] .btn {
      border-radius: 2px;
      font-family: var(--mono);
    }

    .btn-fill {
      background: var(--ink);
      color: var(--paper);
      box-shadow: 0 6px 20px rgba(10, 18, 32, 0.22);
    }

    [data-preset="terminal"] .btn-fill::before {
      content: "> ";
    }

    .btn-glass {
      background: var(--milk);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      border: 0.5px solid var(--hair);
      color: var(--ink);
      box-shadow: 0 1px 0 var(--milk-edge) inset;
    }

    /* Stats row */
    .stats {
      display: flex;
      gap: 36px;
      padding-top: 22px;
      border-top: 0.5px solid var(--hair);
    }

    .stats .k {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--ink-4);
      font-weight: 500;
    }

    .stats .v {
      font-size: 13px;
      color: var(--ink);
      margin-top: 6px;
      font-weight: 500;
    }

    [data-preset="terminal"] .stats .v::before {
      content: "└ ";
      opacity: 0.4;
    }

    /* Hero photo card */
    .photo-card {
      position: relative;
      width: clamp(280px, 32vw, 380px);
      margin-left: auto;
      aspect-ratio: 1;
    }

    .photo-card .frame {
      position: absolute;
      inset: -14px;
      border-radius: 32px;
      background: var(--milk);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border: 0.5px solid var(--milk-edge);
      box-shadow:
        0 1px 0 var(--milk-edge) inset,
        0 -1px 0 var(--hair) inset,
        0 28px 70px rgba(20, 40, 80, 0.22);
    }

    [data-preset="terminal"] .photo-card .frame {
      border-radius: 4px;
      box-shadow: 0 0 0 1px var(--hair) inset, 0 0 60px rgba(93, 210, 201, 0.10);
    }

    .photo-card .photo {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 24px;
      overflow: hidden;
      background: #103a55;
      box-shadow: 0 0 0 0.5px rgba(10, 18, 32, 0.15);
    }

    [data-preset="terminal"] .photo-card .photo {
      border-radius: 2px;
    }

    .photo-card .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
    }

    /* Terminal duotone treatment — single-pass, no destructive blend. */
    [data-preset="terminal"] .photo-card .photo img {
      filter: grayscale(1) contrast(1.05) brightness(0.95) sepia(0.35) hue-rotate(85deg) saturate(1.8);
      opacity: 0.85;
    }

    [data-preset="terminal"] .photo-card .photo {
      background: #0c1a14;
    }

    /* Caustic shimmer overlay on photo */
    .photo .shimmer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 50% 25% at 30% 30%, rgba(255, 255, 255, 0.5), transparent 60%),
        radial-gradient(ellipse 30% 20% at 70% 60%, rgba(255, 255, 255, 0.35), transparent 60%);
      mix-blend-mode: overlay;
      animation: shimmerMove 9s ease-in-out infinite alternate;
      animation-duration: calc(9s / max(var(--motion-scale), 0.0001));
    }

    @keyframes shimmerMove {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 0.7;
      }

      100% {
        transform: translate(-6%, 4%) scale(1.1);
        opacity: 0.9;
      }
    }

    [data-preset="terminal"] .photo .shimmer {
      mix-blend-mode: screen;
      opacity: 0.4;
    }

    /* The MSc '25 badge */
    .msc-badge {
      position: absolute;
      right: 4px;
      top: 16px;
      width: 78px;
      height: 78px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      background: var(--milk);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border: 0.5px solid var(--milk-edge);
      box-shadow: 0 1px 0 var(--milk-edge) inset, 0 10px 30px rgba(20, 40, 80, 0.18);
      animation: spin-slow 36s linear infinite;
      animation-duration: calc(36s / max(var(--motion-scale), 0.0001));
    }

    [data-preset="terminal"] .msc-badge {
      border-radius: 2px;
      animation: none;
      background: rgba(8, 18, 13, 0.86);
      border: 1px solid var(--teal);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      box-shadow: 0 0 0 1px rgba(126, 226, 200, 0.18), 0 0 24px rgba(126, 226, 200, 0.18);
    }

    [data-preset="terminal"] .msc-badge .k {
      color: var(--teal);
      opacity: 0.9;
    }

    [data-preset="terminal"] .msc-badge .y {
      color: var(--ink);
      font-family: var(--mono);
      font-weight: 600;
    }

    .msc-badge .k {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--ink-4);
      font-weight: 600;
      line-height: 1;
    }

    .msc-badge .y {
      font-family: var(--face-em);
      font-size: 26px;
      line-height: 1;
      color: var(--ink);
      margin-top: 4px;
    }

    [data-preset="terminal"] .msc-badge .y {
      font-family: var(--mono);
      font-weight: 600;
    }

    @keyframes spin-slow {
      to {
        transform: rotate(360deg);
      }
    }

    .signature {
      position: absolute;
      left: 16px;
      bottom: 16px;
      font-family: var(--face-em);
      font-style: italic;
      color: #fff;
      font-size: 18px;
      letter-spacing: 0.02em;
      text-shadow: 0 2px 8px rgba(0, 20, 50, 0.6);
    }

    [data-preset="terminal"] .signature {
      font-family: var(--mono);
      font-style: normal;
      color: var(--teal);
      text-shadow: 0 0 8px rgba(93, 210, 201, 0.6);
    }

    [data-preset="terminal"] .signature::before {
      content: "$ ";
    }

    /* ----------  Section header  ---------- */
    .section {
      padding: 80px 0;
      position: relative;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      margin-bottom: 44px;
      gap: 24px;
      flex-wrap: wrap;
    }

    .section-head h2 {
      font-family: var(--face-display);
      font-size: clamp(38px, 4.5vw, 58px);
      line-height: 1.0;
      letter-spacing: -0.03em;
      font-weight: 500;
      color: var(--ink);
      margin: 8px 0 0;
      max-width: 720px;
      text-wrap: balance;
    }

    [data-preset="editorial"] .section-head h2 {
      font-family: var(--face-em);
      font-weight: 400;
      font-size: clamp(46px, 6vw, 80px);
    }

    [data-preset="terminal"] .section-head h2 {
      font-size: clamp(28px, 3.4vw, 42px);
    }

    .section-head .index {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--ink-4);
      letter-spacing: 0.06em;
    }

    /* ----------  Work cards  ---------- */
    .work-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 22px;
    }

    .work-card {
      grid-column: span 6;
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      padding: 26px 26px 24px;
      min-height: 340px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 0.5s cubic-bezier(.2, .7, .2, 1);
      cursor: pointer;
    }

    .work-card.wide {
      grid-column: span 12;
      min-height: 280px;
      flex-direction: row;
      align-items: stretch;
      gap: 32px;
    }

    .work-card.wide .body {
      flex: 1;
    }

    .work-card.wide .preview {
      flex: 1;
    }

    [data-preset="terminal"] .work-card {
      border-radius: 2px;
    }

    [data-preset="editorial"] .work-card {
      border-radius: 4px;
    }

    .work-card:hover {
      transform: translateY(-3px);
    }

    /* Hover sheen */
    .work-card .sheen {
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 40%, rgba(255, 255, 255, 0.5) 50%, transparent 60%);
      transform: translateX(-110%);
      transition: transform 0.9s cubic-bezier(.2, .7, .2, 1);
      pointer-events: none;
      mix-blend-mode: overlay;
    }

    .work-card:hover .sheen {
      transform: translateX(110%);
    }

    [data-preset="terminal"] .work-card .sheen {
      display: none;
    }

    .work-card .meta {
      display: flex;
      gap: 10px;
      align-items: center;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--ink-4);
      font-weight: 500;
    }

    .work-card .meta .sep {
      width: 22px;
      height: 0.5px;
      background: var(--hair);
    }

    .work-card h3 {
      font-family: var(--face-display);
      font-size: 30px;
      line-height: 1.05;
      letter-spacing: -0.025em;
      font-weight: 500;
      margin: 12px 0 8px;
      color: var(--ink);
    }

    [data-preset="editorial"] .work-card h3 {
      font-family: var(--face-em);
      font-weight: 400;
      font-size: 38px;
    }

    [data-preset="terminal"] .work-card h3 {
      font-size: 22px;
      letter-spacing: -0.01em;
    }

    .work-card p {
      font-size: 14px;
      line-height: 1.55;
      color: var(--ink-3);
      margin: 0;
      max-width: 460px;
    }

    .tag-row {
      display: flex;
      gap: 6px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--milk-2);
      border: 0.5px solid var(--hair-2);
      color: var(--ink-2);
      font-weight: 500;
      backdrop-filter: blur(6px);
    }

    [data-preset="terminal"] .tag {
      border-radius: 2px;
      font-family: var(--mono);
      font-size: 10.5px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .work-card .open {
      margin-top: 22px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
    }

    .work-card .open .arr {
      transition: transform 0.4s cubic-bezier(.2, .7, .2, 1);
    }

    .work-card:hover .open .arr {
      transform: translateX(5px);
    }

    /* Mini previews inside cards */
    .preview {
      position: relative;
    }

    /* Preview: chat-stream */
    .chat-stream {
      height: 100%;
      min-height: 200px;
      border-radius: 14px;
      background: var(--milk-2);
      border: 0.5px solid var(--hair-2);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-family: var(--mono);
      font-size: 11.5px;
      line-height: 1.4;
      overflow: hidden;
      color: var(--ink-2);
      position: relative;
    }

    .chat-stream .row {
      display: flex;
      gap: 8px;
    }

    .chat-stream .who {
      color: var(--ink-4);
      font-weight: 600;
      flex-shrink: 0;
    }

    .chat-stream .tok {
      animation: tokenIn 0.35s both;
    }

    @keyframes tokenIn {
      from {
        opacity: 0;
        transform: translateY(2px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .chat-stream .cit {
      display: inline-block;
      padding: 0 5px;
      border-radius: 4px;
      background: rgba(93, 210, 201, 0.18);
      color: var(--teal);
      font-weight: 600;
      margin-left: 2px;
      font-size: 10px;
    }

    .chat-stream .caret {
      display: inline-block;
      width: 6px;
      height: 12px;
      background: var(--ink-2);
      vertical-align: -2px;
      margin-left: 2px;
      animation: blink 1s steps(2, end) infinite;
    }

    /* Preview: poem fragment */
    .poem-card {
      height: 100%;
      min-height: 200px;
      border-radius: 14px;
      padding: 18px;
      position: relative;
      background:
        radial-gradient(circle at 80% 20%, rgba(122, 169, 255, 0.25), transparent 50%),
        radial-gradient(circle at 20% 80%, rgba(93, 210, 201, 0.2), transparent 50%),
        var(--milk-2);
      border: 0.5px solid var(--hair-2);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .poem-card .lines {
      font-family: var(--face-em);
      font-style: italic;
      font-size: 26px;
      line-height: 1.35;
      color: var(--ink);
      text-wrap: balance;
    }

    [data-preset="terminal"] .poem-card .lines {
      font-family: var(--mono);
      font-style: normal;
      font-size: 13px;
    }

    .poem-card .lang-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .poem-card .lang {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--milk-edge);
      color: var(--ink-2);
      letter-spacing: 0.04em;
    }

    [data-preset="terminal"] .poem-card .lang {
      border-radius: 2px;
      font-family: var(--mono);
    }

    /* Preview: streaming chart */
    .stream-viz {
      height: 100%;
      min-height: 200px;
      border-radius: 14px;
      background: var(--milk-2);
      border: 0.5px solid var(--hair-2);
      padding: 16px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .stream-viz .label-row {
      display: flex;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 10.5px;
      color: var(--ink-4);
      letter-spacing: 0.05em;
    }

    .stream-viz svg {
      width: 100%;
      height: 70px;
    }

    /* ----------  Stack section  ---------- */
    .marquee {
      position: relative;
      overflow: hidden;
      margin: 0 -50vw;
      padding: 14px 0;
      border-top: 0.5px solid var(--hair);
      border-bottom: 0.5px solid var(--hair);
      mask-image: linear-gradient(90deg, transparent, black 8%, black 92%, transparent);
    }

    .marquee .track {
      display: flex;
      gap: 56px;
      width: max-content;
      animation: scroll 38s linear infinite;
      animation-duration: calc(38s / max(var(--motion-scale), 0.5));
    }

    @keyframes scroll {
      to {
        transform: translateX(-50%);
      }
    }

    .marquee .item {
      font-family: var(--face-display);
      font-size: 30px;
      letter-spacing: -0.02em;
      color: var(--ink);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 56px;
      white-space: nowrap;
    }

    [data-preset="editorial"] .marquee .item {
      font-family: var(--face-em);
      font-weight: 400;
      font-size: 40px;
      font-style: italic;
    }

    [data-preset="terminal"] .marquee .item {
      font-size: 16px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .marquee .item::after {
      content: "·";
      color: var(--ink-4);
      font-size: 28px;
    }

    [data-preset="terminal"] .marquee .item::after {
      content: "//";
    }

    .stack-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      margin-top: 44px;
    }

    .stack-group {
      padding: 20px 22px;
      border-radius: 18px;
    }

    [data-preset="terminal"] .stack-group {
      border-radius: 2px;
    }

    [data-preset="editorial"] .stack-group {
      border-radius: 4px;
    }

    .stack-group .eyebrow {
      margin-bottom: 14px;
    }

    .stack-group .items {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    /* ----------  Journey timeline  ---------- */
    .timeline {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 24px;
      position: relative;
    }

    .timeline::before {
      content: "";
      position: absolute;
      left: 110px;
      top: 12px;
      bottom: 12px;
      width: 0.5px;
      background: var(--hair);
    }

    [data-preset="terminal"] .timeline::before {
      background: none;
      border-left: 1px dashed var(--hair);
      width: 0;
    }

    .tl-year {
      font-family: var(--face-em);
      font-style: italic;
      font-size: 32px;
      color: var(--ink);
      padding-top: 14px;
      text-align: right;
      padding-right: 22px;
    }

    [data-preset="terminal"] .tl-year {
      font-family: var(--mono);
      font-style: normal;
      font-size: 18px;
    }

    [data-preset="editorial"] .tl-year {
      font-size: 44px;
    }

    .tl-item {
      padding: 16px 22px 24px 38px;
      position: relative;
      border-bottom: 0.5px solid var(--hair-2);
    }

    .tl-item::before {
      content: "";
      position: absolute;
      left: -4px;
      top: 22px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--paper);
      border: 1.5px solid var(--ink);
    }

    [data-preset="terminal"] .tl-item::before {
      border-radius: 0;
      background: var(--paper);
      border: 1px solid var(--ink);
    }

    .tl-item h4 {
      font-size: 17px;
      letter-spacing: -0.01em;
      font-weight: 500;
      margin: 0;
      color: var(--ink);
    }

    .tl-item .role-meta {
      font-size: 12px;
      color: var(--ink-4);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 500;
    }

    .tl-item ul {
      margin: 12px 0 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .tl-item li {
      font-size: 14px;
      line-height: 1.55;
      color: var(--ink-3);
      padding-left: 18px;
      position: relative;
    }

    .tl-item li::before {
      content: "—";
      position: absolute;
      left: 0;
      color: var(--ink-4);
    }

    [data-preset="terminal"] .tl-item li::before {
      content: ">";
      color: var(--teal);
    }

    /* ----------  About strip  ---------- */
    .about-strip {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 56px;
      padding: 56px;
      border-radius: 28px;
    }

    [data-preset="terminal"] .about-strip {
      border-radius: 2px;
      padding: 32px;
    }

    [data-preset="editorial"] .about-strip {
      border-radius: 4px;
    }

    .about-strip h3 {
      font-family: var(--face-display);
      font-size: clamp(28px, 3.2vw, 44px);
      line-height: 1.1;
      letter-spacing: -0.025em;
      font-weight: 500;
      margin: 0;
      color: var(--ink);
    }

    [data-preset="editorial"] .about-strip h3 {
      font-family: var(--face-em);
      font-weight: 400;
      font-size: clamp(36px, 4.2vw, 56px);
    }

    .about-strip h3 em {
      font-family: var(--face-em);
      font-style: italic;
      font-weight: 400;
      color: var(--ink-2);
    }

    [data-preset="terminal"] .about-strip h3 em {
      font-family: var(--mono);
      font-style: normal;
      color: var(--teal);
    }

    .about-strip p {
      font-size: 15px;
      line-height: 1.6;
      color: var(--ink-3);
      margin: 18px 0 0;
      max-width: 460px;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .contact-grid a {
      padding: 18px 22px;
      border-radius: 16px;
      background: var(--milk-2);
      border: 0.5px solid var(--hair-2);
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: transform 0.3s cubic-bezier(.2, .7, .2, 1);
    }

    .contact-grid a:hover {
      transform: translateY(-2px);
      background: var(--milk);
    }

    [data-preset="terminal"] .contact-grid a {
      border-radius: 2px;
    }

    .contact-grid .k {
      font-size: 11px;
      color: var(--ink-4);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-weight: 500;
    }

    .contact-grid .v {
      font-size: 15px;
      color: var(--ink);
      font-weight: 500;
      letter-spacing: -0.005em;
    }

    /* ----------  Footer  ---------- */
    footer.foot {
      margin-top: 80px;
      padding-top: 28px;
      border-top: 0.5px solid var(--hair);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--ink-4);
      flex-wrap: wrap;
      gap: 16px;
    }

    [data-preset="terminal"] footer.foot {
      font-family: var(--mono);
    }

    /* Cursor lens (only on hover-capable devices) */
    .cursor-lens {
      position: fixed;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 0.5px solid var(--milk-edge);
      background: var(--milk);
      backdrop-filter: blur(10px) saturate(1.5);
      -webkit-backdrop-filter: blur(10px) saturate(1.5);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 100;
      transition: width 0.4s cubic-bezier(.2, .7, .2, 1), height 0.4s, opacity 0.4s;
      box-shadow: 0 1px 0 var(--milk-edge) inset, 0 8px 30px rgba(20, 40, 80, 0.18);
      mix-blend-mode: normal;
      opacity: 0;
    }

    @media (hover: hover) {
      .cursor-lens {
        opacity: 0.9;
      }
    }

    .cursor-lens.shrink {
      width: 18px;
      height: 18px;
    }

    [data-preset="terminal"] .cursor-lens {
      border-radius: 0;
      mix-blend-mode: difference;
      background: rgba(93, 210, 201, 0.2);
      border-color: var(--teal);
    }

    /* Reveal on scroll */
    .reveal {
      opacity: 0;
      transition: opacity 0.8s cubic-bezier(.2, .7, .2, 1), transform 0.8s cubic-bezier(.2, .7, .2, 1);
      will-change: transform, opacity;
    }

    .reveal.in {
      opacity: 1;
    }

    /* ----------  Mode toggle (corner)  ---------- */
    .mode-toggle {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 120;
      display: inline-flex;
      padding: 4px;
      border-radius: 999px;
      font-family: var(--face);
      user-select: none;
      isolation: isolate;
    }

    [data-preset="terminal"] .mode-toggle {
      border-radius: 4px;
    }

    .mode-toggle .indicator {
      position: absolute;
      top: 4px;
      bottom: 4px;
      left: 4px;
      width: calc(50% - 4px);
      background: var(--ink);
      border-radius: 999px;
      transition: transform 0.55s cubic-bezier(.2, .8, .2, 1), background 0.4s ease;
      box-shadow: 0 4px 14px rgba(10, 18, 32, 0.20);
      z-index: 0;
    }

    [data-preset="terminal"] .mode-toggle .indicator {
      border-radius: 2px;
      background: var(--teal);
      box-shadow: 0 0 16px rgba(93, 210, 201, 0.35);
    }

    .mode-toggle[data-active="terminal"] .indicator {
      transform: translateX(100%);
    }

    .mode-toggle button {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 16px;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--ink-3);
      border-radius: 999px;
      transition: color 0.4s ease;
      letter-spacing: 0.01em;
      cursor: pointer;
    }

    [data-preset="terminal"] .mode-toggle button {
      font-family: var(--mono);
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.06em;
    }

    .mode-toggle button[data-active="true"] {
      color: var(--paper);
    }

    [data-preset="terminal"] .mode-toggle button[data-active="true"] {
      color: var(--paper);
    }

    .mode-toggle .glyph {
      width: 14px;
      height: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .mode-toggle .glyph svg {
      width: 100%;
      height: 100%;
    }

    @media (max-width: 600px) {
      .mode-toggle {
        right: 14px;
        bottom: 14px;
      }

      .mode-toggle button {
        padding: 7px 12px;
        font-size: 11.5px;
      }
    }

    /* Responsive */
    @media (max-width: 900px) {
      body {
        overflow-x: hidden;
      }

      .hero {
        grid-template-columns: 1fr;
        gap: 40px;
        padding-bottom: 40px;
      }

      .hero .display {
        font-size: clamp(36px, 11vw, 56px);
      }

      /* Terminal mono font is wider — shrink heading and allow the
         < waterline. /> bracket wrapper to reflow rather than overflow. */
      [data-preset="terminal"] .hero .display {
        font-size: clamp(24px, 7vw, 34px);
      }

      [data-preset="terminal"] .hero .em {
        white-space: normal;
        display: inline;
      }

      .stats {
        flex-wrap: wrap;
        gap: 16px 32px;
      }

      .photo-card {
        width: 100%;
        max-width: 400px;
        margin: 0 auto;
      }

      .photo-card .frame {
        inset: -8px;
      }

      .work-card {
        grid-column: span 12 !important;
      }

      .work-card.wide {
        flex-direction: column;
      }

      .stack-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .timeline {
        grid-template-columns: 70px 1fr;
      }

      .timeline::before {
        left: 78px;
      }

      .tl-year {
        font-size: 22px;
        padding-right: 12px;
      }

      .about-strip {
        grid-template-columns: 1fr;
        padding: 32px;
      }

      .contact-grid {
        grid-template-columns: 1fr;
      }

      .nav .links {
        display: none;
      }

      .nav .brand {
        font-size: 13px;
      }

      .nav .cta {
        padding: 8px 14px;
      }

      .msc-badge {
        right: 8px;
        top: 8px;
        width: 64px;
        height: 64px;
      }

      .msc-badge .y {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>

  <!-- SVG filter for water distortion on hero word -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <filter id="waterFilter" x="-8%" y="-15%" width="116%" height="130%">
        <feTurbulence type="fractalNoise" baseFrequency="0.012 0.04" numOctaves="2" seed="3">
          <animate attributeName="baseFrequency" dur="14s" values="0.012 0.04; 0.018 0.06; 0.012 0.04"
            repeatCount="indefinite" />
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" scale="3.5" />
      </filter>
    </defs>
  </svg>

  <div id="root"></div>

  <script>
    // Tweak defaults (host parses this JSON and merges __edit_mode_set_keys edits)
    window.__TWEAK_DEFAULTS__ = /*EDITMODE-BEGIN*/{
      "preset": "glass",
      "motion": "calm",
      "cursor": true,
      "accent": "amber"
    }/*EDITMODE-END*/;
